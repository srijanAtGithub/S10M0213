<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Sicily Navigator (Demo)</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      width: 340px;
      height: 420px;
      margin: 0;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1e1e1e;
      color: #eaeaea;
    }

    #header {
      padding: 10px 12px;
      border-bottom: 1px solid #333;
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #clear-btn {
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid #444;
      background: transparent;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
    }

    #clear-btn:hover {
      background: #2a2a2a;
      color: #eaeaea;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #888;
      display: inline-block;
    }

    #status-dot.connected {
      background: #4caf50;
    }

    #status-dot.disconnected {
      background: #e53935;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 85%;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #3a6df0;
      color: white;
    }

    .msg.ai {
      align-self: flex-start;
      background: #2c2c2c;
      color: #eaeaea;
      border: 1px solid #3a3a3a;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      color: #888;
      font-size: 11px;
      font-style: italic;
    }

    #input-row {
      display: flex;
      padding: 8px;
      border-top: 1px solid #333;
      gap: 6px;
    }

    #input-box {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #3a3a3a;
      background: #2a2a2a;
      color: #eaeaea;
      font-size: 13px;
      outline: none;
    }

    #send-btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #3a6df0;
      color: white;
      font-size: 13px;
      cursor: pointer;
    }

    #send-btn:disabled {
      background: #444;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div id="header">
    <span>Sicily Navigator <span style="color:#888; font-weight:400;"></span></span>
    <div id="header-right">
      <button id="clear-btn" title="Clear this tab's conversation">Clear</button>
      <span id="status-dot"></span>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-row">
    <input id="input-box" type="text" placeholder="Type anything..." autocomplete="off" />
    <button id="send-btn">Send</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
