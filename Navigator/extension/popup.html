<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Sicily Navigator</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Helvetica, sans-serif;
    }

    body {
      width: 100%;
      height: 100vh;
      margin: 0;
      background: transparent;
      overflow: hidden;
    }

    /* --- Main Premium Container (Apple Style) --- */
    .wrap {
      width: 100%;
      height: 100%;
      border-radius: 0;
      /* Side panel has no rounded corners typically, but we can keep subtle */
      border: 1px solid rgba(255, 255, 255, 0.18);
      /* Subtle edge definition */

      /* Glassmorphism Effect */
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      /* Safari support */
      background: rgba(0, 0, 0, 0.95);
      /* Premium Dark Mode Gray, more opaque for side panel */

      /* The "Shader" / Glowing Border Effect */
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.45),
        /* Depth Shadow */
        0 0 20px rgba(94, 92, 230, 0.2),
        /* Subtle Inner Blue Glow */
        inset 0 0 1px rgba(255, 255, 255, 0.1);
      /* Crisp Inner Edge */

      overflow: hidden;
      /* Contains the height animation */
      position: relative;
      /* For the neural glow overlays */
      opacity: 0;
      transform: translateY(10px) scale(0.98);
      /* Start state for entry animation */
      transition:
        opacity 0.3s ease-out,
        transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
    }

    /* Animate in the window */
    .wrap.ready {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* --- Neural Glow Edge --- */
    .neural-glow {
      position: absolute;
      inset: 0;
      border-radius: 0;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle at 20% 30%, rgba(94, 92, 230, 0.25), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(249, 81, 165, 0.25), transparent 50%);
      mix-blend-mode: screen;
      transition: opacity 0.5s ease;
      z-index: 1;
    }

    .wrap.busy .neural-glow {
      opacity: 1;
      animation: neuralPulse 3s ease-in-out infinite alternate;
    }

    @keyframes neuralPulse {
      0% {
        filter: hue-rotate(0deg);
      }

      100% {
        filter: hue-rotate(90deg);
      }
    }

    /* --- Header Layout --- */
    #header {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-weight: 600;
      font-size: 13.5px;
      color: #f2f2f7;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }

    #header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* --- Control Elements & Buttons --- */
    #clear-btn {
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.06);
      color: #f2f2f7;
      font-size: 11.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      backdrop-filter: blur(20px);
    }

    #clear-btn:hover {
      background: rgba(94, 92, 230, 0.28);
    }

    #clear-btn:active {
      transform: scale(0.96);
    }

    /* --- Status Indication --- */
    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8e8e93;
      display: inline-block;
      transition: background-color 0.3s ease;
    }

    #status-dot.connected {
      background: #34c759;
      box-shadow: 0 0 8px rgba(52, 199, 89, 0.4);
    }

    #status-dot.disconnected {
      background: #ff453a;
      box-shadow: 0 0 8px rgba(255, 69, 58, 0.4);
    }

    /* --- Messages Thread --- */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      z-index: 2;
    }

    /* Sleek Apple-like Scrollbar Setup */
    #messages::-webkit-scrollbar {
      width: 7px;
    }

    #messages::-webkit-scrollbar-track {
      background: transparent;
    }

    #messages::-webkit-scrollbar-thumb {
      background: rgba(120, 120, 128, 0.4);
      border-radius: 4px;
    }

    #messages::-webkit-scrollbar-thumb:hover {
      background: rgba(120, 120, 128, 0.6);
    }

    /* --- Chat Bubbles --- */
    .msg {
      max-width: 85%;
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-wrap: break-word;
      transition: transform 0.15s ease-out;
      position: relative;
      z-index: 2;
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(180deg, #5e5ce6 0%, #4a49c9 100%);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 8px rgba(94, 92, 230, 0.2);
    }

    .msg.ai {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #f2f2f7;
      border-bottom-left-radius: 4px;
    }

    .msg.system {
      align-self: center;
      max-width: 95%;
      font-size: 11px;
      font-weight: 500;
      color: rgba(230, 185, 90, 0.95);
      background: rgba(230, 185, 90, 0.12);
      border: 1px solid rgba(230, 185, 90, 0.15);
      padding: 6px 12px;
      border-radius: 10px;
      text-align: center;
    }

    /* --- Action Row & Inputs --- */
    #input-row {
      display: flex;
      padding: 10px 12px 14px 12px;
      gap: 8px;
      align-items: center;
      background: rgba(10, 10, 12, 0.6);
      position: relative;
      z-index: 2;
    }

    #input-box {
      flex: 1;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      background: rgba(10, 10, 12, 0.45);
      color: #f2f2f7;
      font-size: 13.5px;
      outline: none;
      transition: border-color 0.25s ease-out, box-shadow 0.25s ease-out;
      resize: none;
      line-height: 1.5;
    }

    #input-box:focus {
      border-color: rgba(249, 81, 165, 0.3);
      box-shadow: 0 0 14px rgba(255, 105, 180, 0.25);
    }

    #send-btn {
      padding: 9px 15px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.06);
      color: #f2f2f7;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(20px);
      transition: transform 0.1s, background-color 0.15s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    #send-btn:hover:not(:disabled) {
      background: rgba(94, 92, 230, 0.28);
    }

    #send-btn:active:not(:disabled) {
      transform: scale(0.96);
    }

    #send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Scanning scanline for busy state */
    .wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent, rgba(130, 240, 255, 0.15), transparent);
      transform: translateY(-100%);
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .wrap.busy::before {
      opacity: 1;
      animation: scanLine 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes scanLine {
      0% {
        transform: translateY(-100%);
      }

      100% {
        transform: translateY(100%);
      }
    }
  </style>
</head>

<body>
  <div class="wrap" id="app-wrap">
    <div class="neural-glow"></div>
    <div id="header">
      <span>Sicily Navigator</span>
      <div id="header-right">
        <button id="clear-btn" title="Clear this tab's conversation">Clear</button>
        <span id="status-dot"></span>
      </div>
    </div>

    <div id="messages"></div>

    <div id="input-row">
      <input id="input-box" type="text" placeholder="Type anything..." autocomplete="off" />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
