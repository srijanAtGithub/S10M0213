<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Sicily Navigator</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/overlays.css">
</head>

<body>
  <div class="wrap" id="app-wrap">
    <div class="neural-glow"></div>

    <!-- Disconnected State Overlay -->
    <div id="disconnected-screen">
      <div class="dc-orb">
        <div class="dc-orb-ring"></div>
        <div class="dc-orb-ring"></div>
        <div class="dc-orb-ring"></div>
        <div class="dc-orb-core">
          <!-- Broken link icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
            <line x1="4" y1="4" x2="20" y2="20" />
          </svg>
        </div>
      </div>
      <div class="dc-title">Sicily is offline</div>
      <div class="dc-subtitle">
        The navigator bridge isn't running.<br>
        Start it with <span class="dc-code">navigator_bridge.py</span>
      </div>
    </div>

    <div id="drag-overlay">
      <div class="drop-zone" id="zone-collections">
        <div class="zone-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
          </svg>
          <span>Add to Collections</span>
        </div>
      </div>
      <div class="drop-zone" id="zone-context">
        <div class="zone-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
          <span>Add to Context</span>
        </div>
      </div>
    </div>

    <!-- --- Organise Tabs Glass Overlay --- -->
    <div id="organise-tabs-overlay">
      <div class="organise-card">
        <button class="organise-option-btn" id="btn-include-grouped">
          <div class="btn-title">Include grouped tabs</div>
          <div class="btn-desc">Organise all currently open tabs in this window</div>
        </button>

        <button class="organise-option-btn" id="btn-only-ungrouped">
          <div class="btn-title">Only ungrouped tabs</div>
          <div class="btn-desc">Organise the ungrouped tabs only</div>
        </button>
      </div>
    </div>

    <!-- --- Summarise Page Glass Overlay --- -->
    <div id="summary-overlay">
      <div class="organise-card">
        <div class="organise-header">Page Summary</div>
        <div class="summary-text" id="summary-content"></div>
      </div>

      <!-- Floating Glass Buttons -->
      <div class="summary-actions">
        <button class="summary-floating-btn" id="btn-ok-summary">OK</button>
        <button class="summary-floating-btn highlight" id="btn-add-chat-summary">Add to Chat</button>
      </div>
    </div>

    <!-- --- Add to Collections Picker Overlay --- -->
    <div id="collections-picker-overlay">
      <div class="organise-card collections-picker-card">
        <div class="organise-header">Add to Collection</div>
        <div class="collections-picker-preview" id="collections-picker-preview"></div>

        <input type="text" id="collections-picker-input" class="collections-picker-input"
          placeholder="Find or create a collection..." autocomplete="off" />

        <div class="collections-picker-list" id="collections-picker-list">
          <!-- populated at runtime with .collection-picker-item rows -->
        </div>

        <button class="collections-create-btn hidden" id="collections-create-btn">
          <span class="qa-icon">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
          </span>
          <span id="collections-create-btn-label">Create &amp; Add</span>
        </button>
      </div>
    </div>

    <!-- --- Saved Collections View Overlay --- -->
    <div id="collections-view-overlay">
      <div class="organise-card collections-view-card">
        <div class="organise-header" id="collections-view-title">Saved Collections</div>

        <div class="collections-view-list" id="collections-view-list">
          <!-- Populated at runtime -->
        </div>

        <!-- Action Bar (Hidden in Scene A, Visible in Scene B) -->
        <div class="summary-actions" id="collections-view-actions" style="margin-top: 10px; display: none;">
          <button class="summary-floating-btn" id="collections-view-back-btn">← Back to Collections</button>
        </div>
      </div>
    </div>

    <div id="header">
      <div id="header-left">
        <div id="quick-actions">
          <button id="quick-actions-btn">
            <span>Quick Actions</span>
            <svg viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </button>
          <div id="quick-actions-bridge"></div>
          <div id="quick-actions-menu">
            <button class="qa-item" data-action="summarise-page">
              <span class="qa-icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M4 3.5h9l3 3v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-12a1 1 0 0 1 1-1z" stroke="currentColor"
                    stroke-width="1.4" stroke-linejoin="round" />
                  <path d="M13 3.5v3h3" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" />
                  <path d="M6.5 10.5h7M6.5 13h7M6.5 8h3" stroke="currentColor" stroke-width="1.4"
                    stroke-linecap="round" />
                </svg>
              </span>
              <span>Summarise Page</span>
            </button>
            <button class="qa-item" data-action="organise-tabs">
              <span class="qa-icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="2.5" y="4" width="6" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4" />
                  <rect x="11.5" y="4" width="6" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4" />
                  <rect x="2.5" y="11" width="6" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4" />
                  <rect x="11.5" y="11" width="6" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4" />
                </svg>
              </span>
              <span>Organise Tabs</span>
            </button>

            <button class="qa-item" data-action="find-more-like-this">
              <span class="qa-icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="8.5" cy="8.5" r="5" stroke="currentColor" stroke-width="1.4" />
                  <path d="M15.5 15.5L12.3 12.3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                  <path d="M8.5 6v5M6 8.5h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                </svg>
              </span>
              <span>Find More Like This</span>
            </button>

            <div class="qa-divider"></div>

            <button class="qa-item" data-action="reading-lists">
              <span class="qa-icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M5 3.5h10a.5.5 0 0 1 .5.5v12.3a.3.3 0 0 1-.46.25L10 13.8l-5.04 2.75a.3.3 0 0 1-.46-.25V4a.5.5 0 0 1 .5-.5z"
                    stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" />
                </svg>
              </span>
              <span>Your Reading Lists</span>
            </button>

            <button class="qa-item" data-action="saved-collections">
              <span class="qa-icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M6 3.5h5.5L15 7v9a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4.5a1 1 0 0 1 1-1z" stroke="currentColor"
                    stroke-width="1.4" stroke-linejoin="round" />
                  <path d="M11 3.5V7h3.5" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" />
                  <path d="M7.5 10.5h5M7.5 13h3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
                </svg>
              </span>
              <span>Saved Collections</span>
            </button>
          </div>
        </div>

        <button id="clear-btn" title="Clear this tab's conversation">
          Clear
        </button>

        <span id="status-dot"></span>
      </div>
    </div>

    <div id="messages"></div>

    <div id="bottom-dock">
      <div id="context-shelf" class="hidden"></div>

      <div id="input-row">
        <input id="input-box" type="text" placeholder="Ask anything..." autocomplete="off" />

        <button id="send-btn" title="Send">
          <!-- send arrow icon -->
          <svg id="send-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="16" height="16">
            <path d="M3 10L17 10M17 10L11.5 4.5M17 10L11.5 15.5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <!-- spinner icon (hidden by default) -->
          <svg id="send-spinner" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="16"
            height="16" style="display:none;">
            <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.8" stroke-dasharray="28"
              stroke-dashoffset="10" stroke-linecap="round"
              style="animation: sendSpin 0.8s linear infinite; transform-origin: center;" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
