<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Sicily Navigator</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Helvetica, sans-serif;
    }

    body {
      width: 100%;
      height: 100vh;
      margin: 0;
      background: transparent;
      overflow: hidden;
    }

    /* --- Main Premium Container (Apple Style) --- */
    .wrap {
      width: 100%;
      height: 100%;
      border-radius: 0;
      border: 1px solid rgba(255, 255, 255, 0.18);
      
      /* Glassmorphism Effect */
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      background: rgba(0, 0, 0, 0.95); /* Dark base for side panel */

      /* The "Shader" / Glowing Border Effect */
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.45),
        0 0 20px rgba(94, 92, 230, 0.2),
        inset 0 0 1px rgba(255, 255, 255, 0.1);

      overflow: hidden;
      position: relative;
      opacity: 0;
      transform: translateY(10px) scale(0.98);
      transition:
        opacity 0.3s ease-out,
        transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
    }

    .wrap.ready {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* --- Neural Glow Edge (Matches content_script.js) --- */
    .neural-glow {
      position: absolute;
      inset: 0;
      border-radius: 0;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle at 20% 30%, rgba(94, 92, 230, 0.25), transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(249, 81, 165, 0.25), transparent 50%);
      mix-blend-mode: screen;
      transition: opacity 0.5s ease;
      z-index: 1;
    }

    .wrap.busy .neural-glow {
      opacity: 1;
      animation: neuralPulse 3s ease-in-out infinite alternate;
    }

    @keyframes neuralPulse {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(90deg); }
    }

    /* --- Header Layout --- */
    #header {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-weight: 600;
      font-size: 13.5px;
      color: #f2f2f7;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      /* FIXED: Raised z-index so dropdown works */
      z-index: 10; 
    }

    #header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #clear-btn {
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.06);
      color: #f2f2f7;
      font-size: 11.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      backdrop-filter: blur(20px);
    }

    #clear-btn:hover { background: rgba(94, 92, 230, 0.28); }
    #clear-btn:active { transform: scale(0.96); }

    /* --- Quick Actions --- */
    #quick-actions { position: relative; }

    #quick-actions-btn {
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.06);
      color: #f2f2f7;
      font-size: 11.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #quick-actions-btn svg {
      width: 10px;
      height: 10px;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #quick-actions.open #quick-actions-btn svg { transform: rotate(180deg); }
    #quick-actions-btn:hover, #quick-actions.open #quick-actions-btn { background: rgba(94, 92, 230, 0.28); }
    #quick-actions-btn:active { transform: scale(0.96); }

    #quick-actions-bridge {
      position: absolute;
      top: 100%;
      right: 0;
      /* FIXED: Matching menu width to prevent hover loss */
      min-width: 190px;
      height: 10px;
    }

    #quick-actions-menu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 190px;
      
      /* FIXED: Glassmorphism settings matching content_script.js */
      background: rgba(25, 25, 26, 0.35); 
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      box-shadow:
        0 14px 34px rgba(0, 0, 0, 0.5),
        0 0 22px rgba(94, 92, 230, 0.15),
        inset 0 0 1px rgba(255, 255, 255, 0.12);
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 10;
      
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(-6px) scale(0.92);
      transform-origin: top right;
      transition:
        opacity 0.22s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1),
        visibility 0s linear 0.22s;
    }

    #quick-actions.open #quick-actions-menu {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0) scale(1);
      transition:
        opacity 0.22s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1),
        visibility 0s linear 0s;
    }

    .qa-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 9px;
      background: transparent;
      border: none;
      color: #f2f2f7;
      font-size: 12.5px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s ease, transform 0.12s ease, padding-left 0.15s ease;
      opacity: 0;
      transform: translateX(6px);
    }

    #quick-actions.open .qa-item { animation: qaItemIn 0.36s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    #quick-actions.open .qa-item:nth-child(1) { animation-delay: 0.03s; }
    #quick-actions.open .qa-item:nth-child(2) { animation-delay: 0.07s; }
    #quick-actions.open .qa-item:nth-child(3) { animation-delay: 0.11s; }
    #quick-actions.open .qa-item:nth-child(5) { animation-delay: 0.15s; }
    #quick-actions.open .qa-item:nth-child(6) { animation-delay: 0.19s; }

    @keyframes qaItemIn {
      from { opacity: 0; transform: translateX(6px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .qa-item:hover { background: rgba(94, 92, 230, 0.22); padding-left: 13px; }
    .qa-item:active { transform: scale(0.97); background: rgba(94, 92, 230, 0.32); }

    .qa-icon {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.85;
    }
    .qa-icon svg { width: 100%; height: 100%; }

    .qa-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 4px 4px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8e8e93;
      display: inline-block;
      transition: background-color 0.3s ease;
    }
    #status-dot.connected { background: #34c759; box-shadow: 0 0 8px rgba(52, 199, 89, 0.4); }
    #status-dot.disconnected { background: #ff453a; box-shadow: 0 0 8px rgba(255, 69, 58, 0.4); }

    /* --- Messages Thread (Editorial Timeline) --- */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px; /* Generous breathing room */
      display: flex;
      flex-direction: column;
      gap: 10px; /* Distinct vertical separation between turns */
      position: relative;
      z-index: 2;
    }

    #messages::-webkit-scrollbar { width: 7px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: rgba(120, 120, 128, 0.4); border-radius: 4px; }
    #messages::-webkit-scrollbar-thumb:hover { background: rgba(120, 120, 128, 0.6); }

    /* --- Context Trail (shows what was attached to a sent message) --- */
    .msg-context-trail {
      align-self: flex-end;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 5px;
      max-width: 90%;
      margin-bottom: -2px;
      position: relative;
      z-index: 2;
      opacity: 0;
      animation: timelineInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .context-trail-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 10.5px;
      font-weight: 500;
      color: #a1a1aa;
      max-width: 220px;
      cursor: default;
      transition: border-color 0.2s ease, color 0.2s ease, background-color 0.2s ease;
    }

    .context-trail-chip:hover {
      border-color: rgba(255, 255, 255, 0.28);
      color: #d8d8de;
      background: rgba(255, 255, 255, 0.08);
    }

    .context-trail-icon {
      flex-shrink: 0;
      width: 11px;
      height: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.8;
    }
    .context-trail-icon svg { width: 100%; height: 100%; }

    .context-trail-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* --- Base Timeline Typography --- */
    .msg {
      max-width: 100%;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-wrap: break-word;
      position: relative;
      z-index: 2;
    }

    /* --- User Input (Right Aligned, Muted) --- */
    .msg.user {
      align-self: flex-end;
      text-align: right; /* Aligns the text itself to the right */
      background: transparent; /* No bubble */
      color: #a1a1aa; /* Elegant muted gray */
      padding: 0 16px 0 0; /* Padding on the right */
      border-right: 2px solid rgba(255, 255, 255, 0.15); /* Subtle anchor line */
      box-shadow: none;
      border-radius: 0;
      
      /* Cinematic horizontal slide-in */
      opacity: 0;
      transform-origin: center right;
      animation: timelineInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* --- AI Response (Left Aligned, Glowing Accent) --- */
    .msg.ai {
      align-self: flex-start;
      text-align: left;
      /* Soft gradient that fades into transparency, creating a glow without a box */
      background: linear-gradient(90deg, rgba(193, 49, 206, 0.099) 0%, transparent 100%);
      color: #f2f2f7; /* High contrast text */
      padding: 6px 16px 6px 16px; /* Padding on the left */
      border-left: 2px solid #b5b5b585; /* Sicily Navigator purple accent */
      box-shadow: none;
      border-radius: 0;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      
      /* Cinematic horizontal slide-in */
      opacity: 0;
      transform-origin: center left;
      animation: timelineInLeft 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* --- Rendered markdown inside AI messages --- */
    .msg.ai {
      /* Overrides base .msg's pre-wrap: content is now real HTML
         (p/li/pre elements) which already handles its own line breaks. */
      white-space: normal;
    }

    .msg.ai p {
      margin: 0 0 8px 0;
    }
    .msg.ai p:last-child { margin-bottom: 0; }

    .msg.ai h1, .msg.ai h2, .msg.ai h3 {
      margin: 12px 0 6px 0;
      font-weight: 600;
      color: #f2f2f7;
      line-height: 1.3;
    }
    .msg.ai h1:first-child, .msg.ai h2:first-child, .msg.ai h3:first-child { margin-top: 0; }
    .msg.ai h1 { font-size: 16px; }
    .msg.ai h2 { font-size: 15px; }
    .msg.ai h3 { font-size: 14px; }

    .msg.ai strong { font-weight: 700; color: #ffffff; }
    .msg.ai em { font-style: italic; }

    .msg.ai ul, .msg.ai ol {
      margin: 0 0 8px 0;
      padding-left: 20px;
    }
    .msg.ai ul:last-child, .msg.ai ol:last-child { margin-bottom: 0; }
    .msg.ai li { margin: 3px 0; }
    .msg.ai ul { list-style-type: disc; }
    .msg.ai ul li::marker { color: #db5ce6; }
    .msg.ai ol li::marker { color: #db5ce6; font-weight: 600; }

    .msg.ai code {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1px 5px;
      border-radius: 5px;
      color: #e6b95a;
    }

    .msg.ai pre {
      margin: 6px 0 10px 0;
      padding: 10px 12px;
      background: rgba(10, 10, 12, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow-x: auto;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .msg.ai pre code {
      background: transparent;
      border: none;
      padding: 0;
      color: #d8d8de;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre;
    }

    .msg.ai a {
      color: #e67ae2;
      text-decoration: none;
      border-bottom: 1px solid rgba(230, 122, 226, 0.4);
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    .msg.ai a:hover {
      color: #f2a0ee;
      border-bottom-color: rgba(242, 160, 238, 0.7);
    }

    /* --- System/Status Messages --- */
    .msg.system {
      align-self: center;
      background: transparent;
      color: rgba(230, 185, 90, 0.6);
      border: none;
      padding: 0;
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase; /* highly modern label look */
      text-align: center;
    }

    /* --- Timeline Entry Animations --- */
    @keyframes timelineInRight {
      from { opacity: 0; transform: translateX(12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes timelineInLeft {
      from { opacity: 0; transform: translateX(-12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* --- Action Row & Inputs --- */
    #input-row {
      display: flex;
      padding: 10px 12px 14px 12px;
      gap: 8px;
      align-items: center;
      background: rgba(10, 10, 12, 0.6);
      position: relative;
      z-index: 2;
    }

    #input-box {
      flex: 1;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      background: rgba(10, 10, 12, 0.45);
      color: #f2f2f7;
      font-size: 13.5px;
      outline: none;
      transition: border-color 0.25s ease-out, box-shadow 0.25s ease-out;
      resize: none;
      line-height: 1.5;
    }

    #input-box:focus {
      border-color: rgba(249, 81, 165, 0.3);
      box-shadow: 0 0 14px rgba(255, 105, 180, 0.25);
    }

    #send-btn {
      padding: 9px 15px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.06);
      color: #f2f2f7;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(20px);
      transition: transform 0.1s, background-color 0.15s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    #send-btn:hover:not(:disabled) { background: rgba(94, 92, 230, 0.28); }
    #send-btn:active:not(:disabled) { transform: scale(0.96); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Scanning scanline for busy state (Matches content_script.js) */
    .wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent, rgba(130, 240, 255, 0.15), transparent);
      transform: translateY(-100%);
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .wrap.busy::before {
      opacity: 1;
      animation: scanLine 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes scanLine {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    /* --- Drag and Drop Glass Overlay --- */
    #drag-overlay {
      position: absolute;
      inset: 0;
      z-index: 100;
      background: rgba(10, 10, 12, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #drag-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .drop-zone {
      flex: 1;
      border: 2px dashed rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background-color 0.2s, transform 0.2s;
      cursor: copy;
    }

    .zone-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #a1a1aa;
      font-size: 14px;
      font-weight: 500;
      pointer-events: none; /* Crucial to prevent flickering drop bugs */
    }

    .zone-box svg {
      width: 28px;
      height: 28px;
      opacity: 0.7;
      transition: transform 0.2s;
    }

    /* Collections Hover State (Muted grey style) */
    #zone-collections:hover {
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(25, 25, 26, 0.35);
    }

    /* Context Hover State (Matching your Orchid design) */
    #zone-context:hover {
      border-color: #db5ce685;
      background: linear-gradient(135deg, rgba(193, 49, 206, 0.099) 0%, rgba(25, 25, 26, 0.35) 100%);
      box-shadow: 0 0 20px rgba(193, 49, 206, 0.15);
    }
    #zone-context:hover .zone-box svg {
      transform: scale(1.1);
      color: #e67ae2;
    }

    .sub-label {
      font-size: 11px;
      opacity: 0.5;
    }

    /* --- The Glassy Context Shelf (Gemini-style attachment tray) --- */
    #context-shelf {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(10, 10, 12, 0.4);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      max-height: 220px;
      overflow-y: auto;
      position: relative;
      z-index: 2;
    }

    #context-shelf::-webkit-scrollbar { width: 6px; }
    #context-shelf::-webkit-scrollbar-track { background: transparent; }
    #context-shelf::-webkit-scrollbar-thumb { background: rgba(120, 120, 128, 0.4); border-radius: 4px; }

    #context-shelf.hidden { display: none; }

    /* --- Card (collapsed = Gemini pill, expanded = detail card) --- */
    .context-chip {
      --chip-accent: #c7c7cc;
      display: flex;
      flex-direction: column;
      max-width: 220px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow:
        0 2px 8px rgba(0, 0, 0, 0.25),
        inset 0 0 1px rgba(255, 255, 255, 0.1);
      cursor: pointer;
      overflow: hidden;
      transform-origin: bottom center;

      /* Bouncy pop-in entrance, Gemini-esque */
      animation: chipPopIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;

      transition:
        transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
        border-color 0.2s ease,
        max-width 0.32s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes chipPopIn {
      0% { opacity: 0; transform: translateY(10px) scale(0.85); }
      60% { opacity: 1; transform: translateY(-2px) scale(1.03); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Hover: lift up a little, glow */
    .context-chip:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.32);
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.35),
        0 0 18px rgba(255, 255, 255, 0.1),
        inset 0 0 1px rgba(255, 255, 255, 0.15);
    }

    .context-chip:active { transform: translateY(-1px) scale(0.98); }

    /* Expanded state: grow into a full detail card */
    .context-chip.expanded {
      max-width: 320px;
      border-color: rgba(255, 255, 255, 0.32);
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.4),
        0 0 22px rgba(255, 255, 255, 0.08),
        inset 0 0 1px rgba(255, 255, 255, 0.15);
    }

    .context-chip.expanded:hover { transform: translateY(-2px); }

    /* --- Header row (always visible): icon + label + close --- */
    .context-chip-head {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 6px 6px 9px;
    }

    .context-chip-icon {
      flex-shrink: 0;
      width: 15px;
      height: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--chip-accent);
      opacity: 0.9;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .context-chip-icon svg { width: 100%; height: 100%; }
    .context-chip.expanded .context-chip-icon { transform: rotate(-8deg) scale(1.05); }

    .context-chip-label {
      flex: 1;
      min-width: 0;
      font-size: 11.5px;
      font-weight: 500;
      color: #f2f2f7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .context-chip-caret {
      flex-shrink: 0;
      width: 9px;
      height: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.45);
      transition: transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .context-chip-caret svg { width: 100%; height: 100%; }
    .context-chip.expanded .context-chip-caret { transform: rotate(180deg); color: var(--chip-accent); }

    .context-close {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
      line-height: 1;
      transition: color 0.15s, background-color 0.15s, transform 0.15s;
    }
    .context-close:hover {
      color: #ff453a;
      background: rgba(255, 69, 58, 0.12);
      transform: scale(1.15);
    }
    .context-close:active { transform: scale(0.9); }

    /* --- Expandable body: full text, smooth grow --- */
    .context-chip-body {
      display: grid;
      grid-template-rows: 0fr;
      opacity: 0;
      transition:
        grid-template-rows 0.32s cubic-bezier(0.16, 1, 0.3, 1),
        opacity 0.22s ease;
    }

    .context-chip.expanded .context-chip-body {
      grid-template-rows: 1fr;
      opacity: 1;
    }

    .context-chip-body-inner {
      overflow: hidden;
      min-height: 0;
    }

    .context-chip-text {
      margin: 0 9px 9px 9px;
      padding-top: 7px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 11.5px;
      line-height: 1.5;
      color: #d8d8de;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 140px;
      overflow-y: auto;
    }

    .context-chip-text::-webkit-scrollbar { width: 5px; }
    .context-chip-text::-webkit-scrollbar-thumb { background: rgba(120, 120, 128, 0.4); border-radius: 4px; }
  </style>
</head>

<body>
  <div class="wrap" id="app-wrap">
    <div class="neural-glow"></div>

    <div id="drag-overlay">
      <div class="drop-zone" id="zone-collections">
        <div class="zone-box">

      </div>

    </div>

      <div id="header-right">
        <div id="quick-actions">

            </svg>
          </button>
          <div id="quick-actions-bridge"></div>
          <div id="quick-actions-menu">
            <button class="qa-item" data-action="summarise-page">
              <span class="qa-icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M4 3.5h9l3 3v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-12a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                  <path d="M13 3.5v3h3" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                  <path d="M6.5 10.5h7M6.5 13h7M6.5 8h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
              </span>
              <span>Summarise Page</span>
            </button>
            <button class="qa-item" data-action="organise-tabs">
              <span class="qa-icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="2.5" y="4" width="6" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
                  <rect x="11.5" y="4" width="6" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
                  <rect x="2.5" y="11" width="6" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
                  <rect x="11.5" y="11" width="6" height="5" rx="1.2" stroke="currentColor" stroke-width="1.4"/>
                </svg>
              </span>
              <span>Organise Tabs</span>
            </button>
            <button class="qa-item" data-action="find-more-like-this">
              <span class="qa-icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="8.5" cy="8.5" r="5" stroke="currentColor" stroke-width="1.4"/>
                  <path d="M15.5 15.5L12.3 12.3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                  <path d="M8.5 6v5M6 8.5h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
              </span>
              <span>Find More Like This</span>
            </button>
            <div class="qa-divider"></div>
            <button class="qa-item" data-action="reading-lists">
              <span class="qa-icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M5 3.5h10a.5.5 0 0 1 .5.5v12.3a.3.3 0 0 1-.46.25L10 13.8l-5.04 2.75a.3.3 0 0 1-.46-.25V4a.5.5 0 0 1 .5-.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                </svg>
              </span>
              <span>Your Reading Lists</span>
            </button>
            <button class="qa-item" data-action="saved-collections">
              <span class="qa-icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M6 3.5h5.5L15 7v9a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4.5a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                  <path d="M11 3.5V7h3.5" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                  <path d="M7.5 10.5h5M7.5 13h3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                </svg>
              </span>
              <span>Saved Collections</span>
            </button>
          </div>
        </div>
        <button id="clear-btn" title="Clear this tab's conversation">Clear</button>
        <span id="status-dot"></span>
      </div>
    </div>

    <div id="messages"></div>

    <div id="context-shelf" class="hidden"></div>

    <div id="input-row">
      <input id="input-box" type="text" placeholder="Type anything..." autocomplete="off" />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
